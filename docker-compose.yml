version: "3.9"

services:
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VAULTAGENT_API_SECRET=${VAULTAGENT_API_SECRET:-change-me-in-production}
    restart: unless-stopped

  # Optional: MCP proxy server (uncomment to enable)
