  #   environment:
  #     - VAULTAGENT_POLICY_PATH=/app/policies/default.yaml
  #     - VAULTAGENT_AUDIT_PATH=/app/logs/audit.jsonl
  #     - VAULTAGENT_CLOUD_ENDPOINT=http://dashboard:3000/api/v1/ingest
